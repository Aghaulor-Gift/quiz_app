<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>City Quiz</title>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="/" class="logo">City Quiz</a>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <!--Quiz header -->
    <h1>City Quiz</h1>
    

    <!-- Quiz container -->
    <div class="quiz-container" id="quiz-container">

      <!-- Questions -->
      <div class="questions" id="question">
        1. What is the capital of France?
      </div>
      <div class="options" id="options">
        <label>
          <input type="radio" name="option" value="A"> A) Berlin
        </label>
        <label>
          <input type="radio" name="option" value="B"> B) Madrid
        </label>
        <label>
          <input type="radio" name="option" value="C"> C) Paris
        </label>
        <label>
          <input type="radio" name="option" value="D"> D) Rome
        </label>
      </div>

      <!-- Navigation buttons -->

      <button class="prev-btn" id="prev-btn"  style="display: none">Prev</button>
      <button class="next-btn" id="next-btn">Next</button>
      <button class="submit-btn" style="display: none;" id="submit-btn">Submit</button>
    </div>

  
    <!-- Result container -->
    <div class="result-container"   id="result-container" style="display:none;" >
     
    <!-- Score display -->
      <h2 class="header-2 ">Score</h2>
      <p class="score" id="score">
        <span >0</span>
      </p>
      <button class="restart-btn"  id="restart-btn">Restart Quiz</button>

       <!-- Feedback message -->
      <div id="feedback">
        <p><a class="correct_answer" id="correct_answer" >See correct answer!</a></p>
      </div>
    </div>

    

    


  <script src="script.js"></script>
</body>
</html>
